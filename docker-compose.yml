services:

  backend:
    build:
      context: ./backend

    container_name: carshop-backend

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    volumes:
      - ./backend:/app

    depends_on:
      - redis

    command: npm run dev

  redis:
    image: redis:7-alpine

    container_name: carshop-redis

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

volumes:
  redis-data: